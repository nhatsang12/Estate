services:
  - type: web
    name: estate-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 1h
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: CLIENT_URL
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: KYC_PYTHON_SERVICE_URL
        sync: false
      - key: VNPAY_TMNCODE
        sync: false
      - key: VNPAY_HASHSECRET
        sync: false
      - key: VNPAY_URL
        sync: false
      - key: VNPAY_RETURN_URL
        sync: false
      - key: PAYPAL_CLIENT_ID
        sync: false
      - key: PAYPAL_CLIENT_SECRET
        sync: false
      - key: PAYPAL_API_BASE
        value: https://api-m.sandbox.paypal.com
      - key: PAYPAL_RETURN_URL
        sync: false
      - key: PAYPAL_CANCEL_URL
        sync: false
      - key: PAYMENT_SUCCESS_URL
        sync: false
      - key: PAYMENT_FAILED_URL
        sync: false
      - key: PAYMENT_CANCELLED_URL
        sync: false
      - key: PAYMENT_ERROR_URL
        sync: false
      - key: KYC_PYTHON_FACE_COMPARE_URL
        sync: false

  - type: web
    name: estate-kyc
    runtime: python
    plan: free
    rootDir: kyc-python-service
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
